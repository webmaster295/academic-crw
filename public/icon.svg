<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background: school brand colors -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e6fa8"/>
      <stop offset="100%" stop-color="#0d2236"/>
    </linearGradient>
    <!-- Radial highlight top-left (3D light source) -->
    <radialGradient id="bgHL" cx="32%" cy="24%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Document face gradient -->
    <linearGradient id="docFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#deeeff"/>
    </linearGradient>
    <!-- Check badge gradient -->
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <!-- Badge 3D shine -->
    <radialGradient id="badgeHL" cx="34%" cy="28%" r="46%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Clip document to rounded rect -->
    <clipPath id="docClip">
      <rect x="142" y="72" width="210" height="278" rx="18"/>
    </clipPath>
    <!-- Drop shadow for document -->
    <filter id="docShadow" x="-25%" y="-20%" width="150%" height="155%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#060f1e" flood-opacity="0.55"/>
    </filter>
    <!-- Drop shadow for badge -->
    <filter id="badgeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#012b13" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- ══ BACKGROUND ══ -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect width="512" height="512" rx="110" fill="url(#bgHL)"/>

  <!-- Subtle ring accent -->
  <circle cx="256" cy="256" r="195" stroke="#ffffff" stroke-width="1" stroke-opacity="0.06" fill="none"/>

  <!-- ══ DOCUMENT BACK PAGE (3D depth) ══ -->
  <rect x="152" y="82" width="210" height="278" rx="18"
        fill="#5aaad8" opacity="0.42"
        transform="rotate(-7 257 211)"/>

  <!-- ══ DOCUMENT FRONT ══ -->
  <g filter="url(#docShadow)">
    <g clip-path="url(#docClip)">
      <!-- Face -->
      <rect x="142" y="72" width="210" height="278" fill="url(#docFace)"/>

      <!-- Header bar (school navy) -->
      <rect x="142" y="72" width="210" height="66" fill="#1e3a5f"/>

      <!-- ── Graduation cap (gold) ── -->
      <!-- Diamond board top -->
      <polygon points="247,80 269,90 247,100 225,90" fill="#fbbf24"/>
      <!-- Diamond shine -->
      <polygon points="247,80 269,90 258,90 247,84" fill="#fde68a" opacity="0.5"/>
      <!-- Stem -->
      <line x1="247" y1="100" x2="247" y2="115"
            stroke="#fbbf24" stroke-width="3.5" stroke-linecap="round"/>
      <!-- Base -->
      <rect x="235" y="114" width="26" height="11" rx="4" fill="#fbbf24"/>
      <rect x="235" y="114" width="26" height="5" rx="4" fill="#fde68a" opacity="0.45"/>
      <!-- Tassel -->
      <line x1="269" y1="90" x2="278" y2="106"
            stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="278" cy="110" r="4" fill="#f59e0b"/>

      <!-- Header subtitle placeholder bar -->
      <rect x="178" y="118" width="56" height="7" rx="3.5" fill="#93c5fd" opacity="0.4"/>

      <!-- ── Content lines ── -->
      <!-- Title (wider, darker) -->
      <rect x="170" y="156" width="164" height="13" rx="6.5" fill="#bfdbfe"/>
      <!-- Body lines -->
      <rect x="170" y="181" width="132" height="10" rx="5"   fill="#dbeafe"/>
      <rect x="170" y="202" width="152" height="10" rx="5"   fill="#dbeafe"/>
      <rect x="170" y="223" width="112" height="10" rx="5"   fill="#e0f2fe"/>
      <rect x="170" y="244" width="144" height="10" rx="5"   fill="#e0f2fe"/>
      <rect x="170" y="265" width="104" height="10" rx="5"   fill="#eff6ff"/>
      <rect x="170" y="286" width="128" height="10" rx="5"   fill="#eff6ff"/>
    </g>
  </g>

  <!-- ══ CHECK BADGE ══ -->
  <g filter="url(#badgeShadow)">
    <circle cx="322" cy="334" r="74" fill="url(#badge)"/>
  </g>
  <!-- Badge 3D shine -->
  <circle cx="322" cy="334" r="74" fill="url(#badgeHL)"/>
  <!-- Inner glass ring -->
  <circle cx="322" cy="334" r="64" stroke="#ffffff" stroke-width="2" stroke-opacity="0.22" fill="none"/>
  <!-- Checkmark -->
  <path d="M292 334 L315 358 L355 302"
        stroke="#ffffff" stroke-width="20"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>
</svg>
